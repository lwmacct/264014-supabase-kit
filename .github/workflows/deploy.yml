name: docker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      git_commit: ${{ steps.meta.outputs.git_commit }}
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME}"
          else
            APP_VERSION="$(git rev-parse --short HEAD)"
          fi
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "git_commit=${GIT_COMMIT}" >> "${GITHUB_OUTPUT}"
          echo "build_time=${BUILD_TIME}" >> "${GITHUB_OUTPUT}"

  build-frontend:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build frontend assets
        env:
          APP_VERSION: ${{ needs.meta.outputs.app_version }}
          VITE_APP_VERSION: ${{ needs.meta.outputs.app_version }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          GIT_COMMIT: ${{ needs.meta.outputs.git_commit }}
          BUILD_TIME: ${{ needs.meta.outputs.build_time }}
        run: |
          test -n "${VITE_SUPABASE_URL}"
          test -n "${VITE_SUPABASE_ANON_KEY}"
          npm ci
          npm run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error

  build-image:
    runs-on: ubuntu-latest
    needs:
      - meta
      - build-frontend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .artifacts/frontend

      - name: Prepare image inputs
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          FRONTEND_ROOT="$(dirname "$(find .artifacts/frontend -type f -name index.html -print -quit)")"
          test -n "${FRONTEND_ROOT}"
          cp -a "${FRONTEND_ROOT}/." dist/
          test -f dist/index.html

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for verification
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository }}:build-${{ needs.meta.outputs.git_commit }}

      - name: Build and push release image
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 执行远程 SSH 命令
        env:
          DOCKER_IMAGE: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_SSH_HOST }}
          port: ${{ vars.DEPLOY_SSH_PORT }}
          username: ${{ vars.DEPLOY_SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE }}
          envs: DOCKER_IMAGE
          script: bash ${{ vars.DEPLOY_SCRIPT }}
